services:
  backend:
    build: ./backend
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:?Set GROQ_API_KEY in .env}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CHROMA_PATH: /app/storage/chroma
      UPLOAD_PATH: /app/storage/uploads
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    volumes:
      - examrag-storage:/app/storage
    ports:
      - "8001:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  mlflow:
    build: ./backend
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:////app/storage/mlflow.db", "--default-artifact-root", "/app/storage/mlruns"]
    volumes:
      - examrag-storage:/app/storage
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  examrag-storage:
